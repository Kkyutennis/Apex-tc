<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>APEX-TC | Singles Format</title>
  <style>
    :root{
      --bg:#070b16; --card: rgba(255,255,255,.07); --line: rgba(255,255,255,.10);
      --text:#eaf0ff; --muted: rgba(234,240,255,.70);
      --accent:#7c5cff; --good:#33d17a; --bad:#ff5c7a;
      --shadow: 0 20px 50px rgba(0,0,0,.45); --radius: 18px;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:var(--sans); color:var(--text); min-height:100vh;
      background:
        radial-gradient(1100px 500px at 20% 10%, rgba(124,92,255,.25), transparent 55%),
        radial-gradient(900px 500px at 85% 35%, rgba(51,209,122,.18), transparent 55%),
        var(--bg);
    }
    .wrap{max-width:900px; margin:0 auto; padding:20px 16px 60px;}
    header{display:flex; justify-content:space-between; align-items:center; gap:10px;}
    h1{margin:0; font-size:18px;}
    .card{
      margin-top:12px;
      border:1px solid var(--line);
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:18px;
      backdrop-filter: blur(10px);
    }
    .hint{color:var(--muted); font-size:13px; line-height:1.5;}
    .two{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px;}
    @media(max-width:600px){ .two{grid-template-columns:1fr;} }
    button{
      width:100%;
      padding:16px 14px;
      border-radius:16px;
      border:1px solid rgba(124,92,255,.55);
      background: rgba(124,92,255,.18);
      color: var(--text);
      font-size:16px;
      cursor:pointer;
    }
    .secondary{border-color: rgba(255,255,255,.22); background: rgba(255,255,255,.08);}
    .good{border-color: rgba(51,209,122,.55); background: rgba(51,209,122,.12);}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <button class="secondary" onclick="location.href='index.html'">← 홈</button>
      <h1>Singles Format</h1>
      <div style="width:80px;"></div>
    </header>

    <div class="card">
      <div class="hint">
        Singles 경기 형식을 선택해줘. 선택하면 다음 화면에서 점수를 입력할 수 있어요.
      </div>

      <div class="two">
        <button class="good" onclick="location.href='match.html?mode=singles&format=6game'">
          🎾 6-game (1 set)
        </button>

        <button class="secondary" onclick="location.href='match.html?mode=singles&format=10tb'">
          🔥 10-point Tiebreak
        </button>
      </div>

      <div class="hint" style="margin-top:12px;">
        • 6-game: 예) 6:3, 6:5, 4:2<br/>
        • 10TB: 타이브레이크 점수 (0~20, 승자 10점 이상 + 2점 차)
      </div>
    </div>
  </div>
</body>
</html>
