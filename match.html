<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>APEX-TC | Match</title>
  <style>
    :root{
      --bg:#070b16; --card: rgba(255,255,255,.06); --line: rgba(255,255,255,.10);
      --text:#eaf0ff; --muted: rgba(234,240,255,.70);
      --accent:#7c5cff; --good:#33d17a; --bad:#ff5c7a;
      --shadow: 0 20px 50px rgba(0,0,0,.45); --radius: 18px;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:var(--sans); color:var(--text); min-height:100vh;
      background:
        radial-gradient(1100px 500px at 20% 10%, rgba(124,92,255,.25), transparent 55%),
        radial-gradient(900px 500px at 85% 35%, rgba(51,209,122,.18), transparent 55%),
        var(--bg);
    }
    .wrap{max-width:900px; margin:0 auto; padding:20px 16px 60px;}
    header{display:flex; justify-content:space-between; align-items:center; gap:10px;}
    h1{margin:0; font-size:18px;}
    .pill{border:1px solid var(--line); background:rgba(255,255,255,.05); padding:8px 10px; border-radius:999px; color:var(--muted); font-size:13px;}
    .card{
      margin-top:12px;
      border:1px solid var(--line); background:var(--card); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:16px; backdrop-filter: blur(10px);
    }
    label{display:block; font-size:12px; color:var(--muted); margin:10px 0 6px;}
    select,input{
      width:100%; padding:11px 12px; border-radius:14px; border:1px solid var(--line);
      background: rgba(0,0,0,.25); color:var(--text); outline:none;
    }
    .two{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    @media(max-width:600px){ .two{grid-template-columns:1fr;} }
    button{
      padding:11px 12px; border-radius:14px; border:1px solid rgba(124,92,255,.55);
      background: rgba(124,92,255,.18); color: var(--text); cursor:pointer;
    }
    .secondary{border-color: rgba(255,255,255,.22); background: rgba(255,255,255,.08);}
    .good{border-color: rgba(51,209,122,.55); background: rgba(51,209,122,.12);}
    .msg{margin-top:10px; font-size:13px;}
    .msg.good{color:var(--good)} .msg.bad{color:var(--bad)}
    .hint{color:var(--muted); font-size:13px; line-height:1.5;}
    .mono{font-family:var(--mono);}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <button class="secondary" onclick="location.href='index.html'">← 홈</button>
      <h1 id="pageTitle">Match</h1>
      <div class="pill" id="sync">players: loading…</div>
    </header>

    <div class="card">
      <div class="hint" id="hintText">
        한 세트 게임 스코어를 입력해요 (예: 6:3, 6:5, 4:2).
      </div>

      <!-- ✅ Singles: 형식 선택 화면 (format 없을 때 표시) -->
      <div id="singlesPick" style="display:none; margin-top:12px;">
        <div class="hint" style="margin-top:0;">
          Singles 경기 형식을 선택해줘.
        </div>

        <div class="two" style="margin-top:12px;">
          <button class="good" id="pick6">🎾 6-game / 4-game</button>
          <button class="secondary" id="pick10">🔥 10-point Tiebreak</button>
        </div>

        <div class="hint" style="margin-top:10px;">
          • 6-game / 4-game: 예) 6:3, 6:5, 4:2, 4:3<br/>
          • 10TB: 타이브레이크 점수 (0~20, 승자 10점 이상 + 2점 차)
        </div>
      </div>

      <!-- Singles / Doubles 선택 영역 -->
      <div id="singlesBlock">
        <div class="two">
          <div>
            <label>Player A</label>
            <select id="sA"></select>
          </div>
          <div>
            <label>Player B</label>
            <select id="sB"></select>
          </div>
        </div>
      </div>

      <div id="doublesBlock" style="display:none;">
        <div class="two">
          <div><label>Team A - 1</label><select id="dA1"></select></div>
          <div><label>Team A - 2</label><select id="dA2"></select></div>
        </div>
        <div class="two" style="margin-top:8px;">
          <div><label>Team B - 1</label><select id="dB1"></select></div>
          <div><label>Team B - 2</label><select id="dB2"></select></div>
        </div>
      </div>

      <!-- ✅ 점수 입력 블록 (숨김/표시를 이 블록으로만 제어) -->
      <div id="scoreBlock" class="two" style="margin-top:10px;">
        <div>
          <label id="labelA">Games A</label>
          <input id="gamesA" type="number" min="0" max="6" placeholder="예: 6" />
        </div>
        <div>
          <label id="labelB">Games B</label>
          <input id="gamesB" type="number" min="0" max="6" placeholder="예: 3" />
        </div>
      </div>

      <!-- ✅ 액션 버튼 블록 -->
      <div id="actionBlock" class="two" style="margin-top:12px;">
        <button class="good" id="saveBtn">저장</button>
        <button class="secondary" onclick="location.href='players.html'">참가자 관리로</button>
      </div>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://bojzlfjtjzpdyhcyzzvu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_u-o3XzuBwFRbG2woRNsPkA_GPlLIdE2";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (id)=>document.getElementById(id);
    const params = new URLSearchParams(location.search);

    const mode = (params.get("mode") || "singles").toLowerCase();
    const format = (params.get("format") || "").toLowerCase(); // "6game" | "10tb" | ""

    const pageTitle = $("pageTitle");
    const sync = $("sync");
    const msg = $("msg");

    const hintText = $("hintText");

    const singlesPick = $("singlesPick");
    const singlesBlock = $("singlesBlock");
    const doublesBlock = $("doublesBlock");
    const scoreBlock = $("scoreBlock");
    const actionBlock = $("actionBlock");

    const labelA = $("labelA");
    const labelB = $("labelB");
    const inputA = $("gamesA");
    const inputB = $("gamesB");

    function setMsg(text, kind=""){
      msg.className = "msg " + kind;
      msg.textContent = text;
    }

    function fillSelect(sel, players){
      sel.innerHTML = `<option value="">— 선택 —</option>`;
      for(const p of players){
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.name;
        sel.appendChild(opt);
      }
    }

    async function loadPlayers(){
      const { data, error } = await supabase
        .from("players")
        .select("id, name")
        .order("name", { ascending: true });

      if(error){
        sync.textContent = "players: error";
        console.error(error);
        return [];
      }
      sync.textContent = `players: ${data.length}`;
      return data ?? [];
    }

    function validateGames6(a,b){
      if(!Number.isFinite(a) || !Number.isFinite(b)) return "게임 스코어를 입력해줘.";
      if(a === b) return "무승부는 안 돼.";
      if(a < 0 || b < 0 || a > 6 || b > 6) return "게임은 0~6 범위로 입력해줘.";
    
      const hi = Math.max(a,b);
      const lo = Math.min(a,b);
    
      // 승자의 점수는 4 또는 6만 허용
      if(!(hi === 4 || hi === 6)) {
        return "승자의 점수는 4 또는 6이어야 해. (예: 4:2, 4:3, 6:3, 6:5)";
      }
    
      // 진 쪽 점수는 승자보다 작아야 함
      if(lo >= hi) {
        return "올바른 스코어를 입력해줘.";
      }
      return null;
    }

    function validateTB10(a,b){
      if(!Number.isFinite(a) || !Number.isFinite(b)) return "타이브레이크 점수를 입력해줘.";
      if(a === b) return "무승부는 안 돼.";
      if(a < 0 || b < 0 || a > 20 || b > 20) return "타이브레이크는 0~20 범위로 입력해줘.";

      const hi = Math.max(a,b), lo = Math.min(a,b);
      if(hi < 10) return "10점 타이브레이크는 승자가 최소 10점 이상이어야 해.";
      if(hi - lo < 2) return "타이브레이크는 2점 차로 이겨야 해. (예: 10:8, 12:10, 20:18)";
      return null;
    }

    function allUnique(arr){
      const clean = arr.filter(Boolean);
      return new Set(clean).size === clean.length;
    }

    function showSinglesPick(){
      singlesPick.style.display = "block";
      singlesBlock.style.display = "none";
      doublesBlock.style.display = "none";
      scoreBlock.style.display = "none";
      actionBlock.style.display = "none";

      hintText.textContent = "Singles 경기 형식을 선택해줘.";
      setMsg("");

      $("pick6").onclick = () => location.href = "match.html?mode=singles&format=6game";
      $("pick10").onclick = () => location.href = "match.html?mode=singles&format=10tb";
    }

    function applySinglesFormatUI(fmt){
      singlesPick.style.display = "none";
      singlesBlock.style.display = "block";
      doublesBlock.style.display = "none";
      scoreBlock.style.display = "";
      actionBlock.style.display = "";

      if(fmt === "10tb"){
        hintText.textContent = "10점 타이브레이크 점수를 입력해요. (0~20, 승자 10점 이상 + 2점 차)";
        labelA.textContent = "TB Points A";
        labelB.textContent = "TB Points B";
        inputA.min = "0"; inputA.max = "20"; inputA.placeholder = "예: 10";
        inputB.min = "0"; inputB.max = "20"; inputB.placeholder = "예: 8";
      } else {
        hintText.textContent = "한 세트 게임 스코어를 입력해요 (예: 6:3, 6:5, 4:2).";
        labelA.textContent = "Games A";
        labelB.textContent = "Games B";
        inputA.min = "0"; inputA.max = "6"; inputA.placeholder = "예: 6";
        inputB.min = "0"; inputB.max = "6"; inputB.placeholder = "예: 3";
      }
    }

    async function saveMatch(){
      const a = Number(inputA.value);
      const b = Number(inputB.value);

      let err = null;
      if(mode === "singles" && format === "10tb") err = validateTB10(a, b);
      else err = validateGames6(a, b);

      if(err){ setMsg(err, "bad"); return; }

      let team_a=[], team_b=[];
      if(mode === "singles"){
        const A = $("sA").value, B = $("sB").value;
        if(!A || !B) { setMsg("플레이어 A/B를 선택해줘.", "bad"); return; }
        if(A===B) { setMsg("같은 사람을 둘 다 선택할 수 없어.", "bad"); return; }
        team_a=[A]; team_b=[B];
      } else {
        const A1=$("dA1").value, A2=$("dA2").value, B1=$("dB1").value, B2=$("dB2").value;
        if(!A1||!A2||!B1||!B2){ setMsg("더블은 4명을 모두 선택해줘.", "bad"); return; }
        if(!allUnique([A1,A2,B1,B2])){ setMsg("더블에서 같은 사람을 중복 선택할 수 없어.", "bad"); return; }
        team_a=[A1,A2]; team_b=[B1,B2];
      }

      setMsg("저장 중…");
      const { error } = await supabase.from("matches").insert({
        mode,
        team_a,
        team_b,
        games_a: a,
        games_b: b
        // 나중에 컬럼 추가하면 score_format: format
      });

      if(error){
        setMsg("저장 실패: " + error.message, "bad");
        return;
      }

      setMsg("저장 완료!", "good");
      inputA.value = ""; inputB.value = "";
    }

    // ✅ 초기 화면 구성
    if(mode === "doubles"){
      pageTitle.textContent = "Doubles Match";
      singlesPick.style.display = "none";
      singlesBlock.style.display = "none";
      doublesBlock.style.display = "block";
      scoreBlock.style.display = "";
      actionBlock.style.display = "";
      hintText.textContent = "한 세트 게임 스코어를 입력해요 (예: 6:3, 6:5, 4:2).";
    } else {
      pageTitle.textContent = "Singles Match";
      // singles인데 format 없으면 선택 화면
      if(!["6game","10tb"].includes(format)){
        showSinglesPick();
      } else {
        applySinglesFormatUI(format);
      }
    }

    // players 로딩/셀렉트 채우기
    const players = await loadPlayers();
    fillSelect($("sA"), players); fillSelect($("sB"), players);
    fillSelect($("dA1"), players); fillSelect($("dA2"), players);
    fillSelect($("dB1"), players); fillSelect($("dB2"), players);

    $("saveBtn").addEventListener("click", saveMatch);
  </script>
</body>
</html>
